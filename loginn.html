<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QuickFix</title>
    <link rel="stylesheet" href="main-style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 25px; color: var(--dark); }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <h1 onclick="window.location.href='index.html'" style="cursor:pointer">Quick<span>Fix</span></h1>
        <ul>
            <li><a href="Main_homepage.html">Back to Home</a></li>
        </ul>
    </nav>

    <div class="container login-container">
        <div class="login-card">
            <h2>Look who is here!! Welcome back</h2>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="abcd@mail.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="pass" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">Login Now</button>
            <p style="margin-top: 20px; color: #666;">Don't have an account? <a href="signup.html" style="color: var(--primary);">Sign Up</a></p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(email && pass) {
                // Login Success! Save login state
                localStorage.setItem('isLoggedIn', 'true');
                alert("Login Successful!");
                window.location.href = "find-service.html";
            } else {
                alert("Please enter both Email and Password!");
            }
        }
    </script>
</body>
</html>
